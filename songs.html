<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheerApp</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Cutive+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="content-page.css">
    <link rel="stylesheet" href="buttons.css">
    <link rel="stylesheet" href="content-shrink-btns.css">

    <style>
        .content-wrap {
            width: 100%;
        }

        iframe {
            min-width: 100%;
        }
    </style>

</head>
<body>
    <div class="spacer">
        <!-- is here so that 'main' is pushed down... -->
        <!-- there are of course better (pure-css) ways to do it... more at: -->
        <!-- https://stackoverflow.com/questions/42975705/flex-items-evenly-spaced-but-first-item-aligned-left -->
    </div>
    <noscript style="text-align: center">
        Please enable JavaScript to enjoy this website &lt;3
    </noscript>
    <main>
        <div class="content-wrap">
            <iframe id="main-video"
            width="560" height="315" frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen></iframe>
            <!-- <iframe src="https://www.youtube.com/embed/XaCrQL_8eMY" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe> -->
        </div>
    </main>
    <footer>
        <div class="nav-btns">
            <button class="btn rect-btn" ontouchstart="" id="btn-home">
                let's try something else
            </button>
            <button class="btn rect-btn" ontouchstart="" id="btn-again">
                show me another one
            </button>
            <button class="btn rect-btn" ontouchstart="" id="btn-am-better">
                thanks, i feel better
            </button>
        </div>
    </footer>
    <script src="content-shared-btns.js"></script>
    <script src="random-iter.js"></script>
    <script src="songs.js"></script>
</body>
</html>
